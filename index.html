<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIV_SECURE_SRV_404</title>
    <style>
        body { background: black; color: #00FF00; font-family: 'Courier New', Courier, monospace; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #terminal { width: 90%; max-width: 500px; padding: 20px; border: 1px solid #00FF00; box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        .progress-container { width: 100%; border: 1px solid #00FF00; height: 15px; margin: 15px 0; }
        #progress-bar { width: 0%; height: 100%; background: #00FF00; }
        video { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 9999; }
        .hidden { display: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 10000; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div id="terminal">
        <p>> INITIALIZING REMOTE EXPLOIT...</p>
        <p>> BYPASSING UNIVERSITY FIREWALL [v4.22.1]...</p>
        <p style="color: yellow;">> TARGET: FACULTY_DATABASE_SECURE_STORAGE</p>
        <p>> STATUS: EXTRACTING FACULTY RECORDS...</p>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <p id="percent">DECRYPTING: 0%</p>
    </div>

    <!-- The Overlay ensures the video plays with sound on mobile -->
    <div id="overlay"></div>

    <video id="prankVideo" playsinline>
        <source src="cat_meme.mp4" type="video/mp4">
    </video>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');
        const video = document.getElementById('prankVideo');
        const terminal = document.getElementById('terminal');
        const overlay = document.getElementById('overlay');

        let width = 0;
        let id = setInterval(frame, 60);

        function frame() {
            if (width >= 100) {
                clearInterval(id);
                showAccessGranted();
            } else {
                width += Math.floor(Math.random() * 4) + 1;
                if (width > 100) width = 100;
                progressBar.style.width = width + '%';
                percentText.innerText = 'DECRYPTING: ' + width + '%';
            }
        }

        function showAccessGranted() {
            percentText.innerHTML = '<span style="color: white; background: red; padding: 2px 5px;">ACCESS GRANTED. CLICK TO OPEN DATABASE.</span>';
            overlay.style.display = 'block'; // Make the whole screen clickable
        }

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            terminal.classList.add('hidden');
            video.style.display = 'block';
            video.play();
        });
    </script>
</body>
</html>
