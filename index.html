<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIV_SECURE_PORTAL</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        #terminal { width: 90%; max-width: 450px; border: 1px solid #0f0; padding: 20px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        .alert-box { display: none; background: red; color: white; padding: 20px; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .blink { animation: blinker 0.4s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .progress-bar { width: 100%; height: 12px; border: 1px solid #0f0; margin: 15px 0; }
        #fill { width: 0%; height: 100%; background: #0f0; }
        video { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 20000; }
        button { background: #0f0; color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-family: inherit; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="terminal">
        <p>> CAMPUS_NET AUTHENTICATED...</p>
        <p>> TARGET: FACULTY_DATABASE_ENCRYPTION</p>
        <div class="progress-bar"><div id="fill"></div></div>
        <p id="status-text">EXTRACTING DATA: 0%</p>
        <div id="btn-container"></div>
    </div>

    <div id="scary-overlay" class="alert-box">
        <h1 class="blink">⚠️ SECURITY VIOLATION ⚠️</h1>
        <p><strong>IP LOGGED:</strong> 192.168.1.<span id="fake-ip"></span></p>
        <p><strong>DEVICE ID:</strong> <span id="fake-id"></span></p>
        <p><strong>STATUS:</strong> UPLOADING TO CAMPUS POLICE...</p>
        <h2 id="timer">GPS LOCK IN: 3</h2>
    </div>

    <video id="prankVideo" playsinline>
        <source src="cat_meme.mp4" type="video/mp4">
    </video>

    <script>
        const fill = document.getElementById('fill');
        const statusText = document.getElementById('status-text');
        const btnContainer = document.getElementById('btn-container');
        const video = document.getElementById('prankVideo');

        // Randomize fake IDs for realism
        document.getElementById('fake-ip').innerText = Math.floor(Math.random() * 255);
        document.getElementById('fake-id').innerText = Math.random().toString(36).substring(7).toUpperCase();

        let width = 0;
        let id = setInterval(() => {
            if (width >= 100) {
                clearInterval(id);
                btnContainer.innerHTML = '<button onclick="triggerAlert()">DECRYPT FACULTY_GRADES.PDF</button>';
            } else {
                width += Math.floor(Math.random() * 5) + 1;
                fill.style.width = width + '%';
                statusText.innerText = 'EXTRACTING DATA: ' + width + '%';
            }
        }, 80);

        function triggerAlert() {
            document.getElementById('scary-overlay').style.display = 'flex';
            let count = 3;
            let countdown = setInterval(() => {
                count--;
                document.getElementById('timer').innerText = 'GPS LOCK IN: ' + count;
                if (count <= 0) {
                    clearInterval(countdown);
                    startVideo();
                }
            }, 1000);
        }

        function startVideo() {
            document.getElementById('scary-overlay').style.display = 'none';
            video.style.display = 'block';
            video.muted = false;
            video.volume = 1.0;
            video.play();
        }
    </script>
</body>
</html>
